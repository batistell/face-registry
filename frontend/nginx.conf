server {
    listen 80;
    listen 443 ssl;
    server_name localhost;

    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;

    # Redireciona HTTP para HTTPS se estiver atrás do Cloudflare Proxy/Tunnel
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    # Caminho com prefixo para o domínio principal (Zero Trust)
    location /face-registry/ {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /face-registry/index.html;
    }

    # Caminho raiz para compatibilidade local direta (ex: http://localhost:4200/)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy para API no subcaminho
    location /face-registry/api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy para API no caminho raiz (compatibilidade local/desenvolvimento)
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Tratamento de erros
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
