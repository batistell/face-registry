name: CI/CD Pipeline

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    name: Build & Test (CI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Backend CI
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & Run Backend Tests
        run: |
          cd backend
          mvn clean test

      # Frontend CI
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

  build-and-push-docker:
    name: Build & Push Docker Images (CD)
    needs: build-and-test
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}

  deploy:
    name: Deploy to EC2 (CD)
    needs: build-and-push-docker
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: ec2
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check Secrets
        run: |
          echo "==== Validating Deploy Secrets ===="
          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "❌ ERROR: EC2_HOST secret is empty!"
          else
            echo "✅ EC2_HOST secret is populated."
          fi
          
          if [ -z "${{ secrets.EC2_USER }}" ]; then
            echo "❌ ERROR: EC2_USER secret is empty!"
          else
            echo "✅ EC2_USER secret is populated."
          fi
          
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "❌ ERROR: EC2_SSH_KEY secret is empty!"
          else
            echo "✅ EC2_SSH_KEY secret is populated."
          fi

          if [ -z "${{ secrets.EC2_SSH_PASSPHRASE }}" ]; then
            echo "❌ ERROR: EC2_SSH_PASSPHRASE secret is empty!"
          else
            echo "✅ EC2_SSH_PASSPHRASE secret is populated."
          fi
          echo "==================================="

      - name: Copy docker-compose.yml via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          passphrase: ${{ secrets.EC2_SSH_PASSPHRASE }}
          source: "docker-compose.yml"
          target: "~/face-registry"

      - name: SSH to EC2 and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          passphrase: ${{ secrets.EC2_SSH_PASSPHRASE }}
          script: |
            # Create project directory if it doesn't exist
            mkdir -p ~/face-registry
            cd ~/face-registry

            # Update or create the .env file with the current version tag
            if [ -f .env ]; then
              sed -i '/^VERSION=/d' .env
            fi
            echo "VERSION=${{ github.sha }}" >> .env

            # Export the version for the current shell session
            export VERSION=${{ github.sha }}

            # Show the version on the screen
            echo "Deploying version: $VERSION"

            # Log in to GitHub Container Registry in order to pull images
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Stop and remove existing containers to ensure a clean state
            echo "Stopping existing containers..."
            docker compose down

            # Pull the new images from GHCR
            echo "Pulling new images..."
            docker compose pull

            # Recreate the containers with new images and wait for completion
            echo "Starting containers..."
            docker compose up -d --wait

            # Clean up older unused docker images to free disk space
            docker image prune -f
