version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: face-registry-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: faceregistry
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d faceregistry"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: face-registry-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/faceregistry
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      FACE_RECOGNITION_THRESHOLD: "0.60"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: face-registry-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: face-registry-tunnel
    command: tunnel --no-autoupdate --url http://frontend:80
    depends_on:
      - frontend

volumes:
  pgdata:
