version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: face-registry-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: faceregistry
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d faceregistry"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/batistell/face-registry/backend:${VERSION:-latest}
    build:
      context: ./
      dockerfile: backend/Dockerfile
    container_name: face-registry-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST:-db}:5432/faceregistry
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      FACE_RECOGNITION_THRESHOLD: ${FACE_RECOGNITION_THRESHOLD:-0.60}
      FACE_DETECTION_CONF_THRESHOLD: ${FACE_DETECTION_CONF_THRESHOLD:-0.50}
      FACE_BIOMETRICS_MOCK: ${FACE_BIOMETRICS_MOCK:-false}
      PYTORCH_FLAVOR: cpu
      VERSION: ${VERSION:-latest}
      # LD_LIBRARY_PATH: /root/.djl.ai/pytorch/2.2.2-cu121-linux-x86_64
      # NVIDIA_VISIBLE_DEVICES: all
      # NVIDIA_DRIVER_CAPABILITIES: all
    volumes:
      - djl_cache:/root/.djl.ai
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ghcr.io/batistell/face-registry/frontend:${VERSION:-latest}
    build:
      context: ./
      dockerfile: frontend/Dockerfile
    container_name: face-registry-frontend
    ports:
      - "4200:80"
      - "8000:443"
    depends_on:
      - backend

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: face-registry-tunnel
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run --protocol http2
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      - frontend

volumes:
  pgdata:
  djl_cache:
